<!DOCTYPE html>
<html lang="uk">
<head>
    {% load static %}
    <meta charset="UTF-8">
    <title>{% block title %}MiniPortfolio{% endblock %}</title>
    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Власні стилі -->
    <link rel="stylesheet" href="{% static 'portfolio/style.css' %}">
</head>
<body class="d-flex flex-column min-vh-100">

    <!-- Header завжди зверху -->
    {% include "portfolio/header.html" %}

    <!-- Основний контент -->
    <main class="flex-fill container mt-4">
        {% block content %}{% endblock %}
    </main>

    <!-- Footer завжди знизу -->
    {% include "portfolio/footer.html" %}

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
