{% extends "portfolio/main.html" %}
{% block title %}Запит на видалення{% endblock %}
{% block content %}
<h2>Запит на видалення проєкту "{{ project.title }}"</h2>
<form method="post" class="w-50 mx-auto">
    {% csrf_token %}
    <label>Причина:</label>
    <textarea name="reason" class="form-control" required></textarea>
    <button type="submit" class="btn btn-danger mt-3">Надіслати запит</button>
</form>
{% endblock %}
