<header class="bg-dark text-white py-3 mb-4">
    <div class="container d-flex justify-content-between align-items-center">
        <h1 class="h4 m-0">MiniPortfolio</h1>
        <nav>
            <a href="{% url 'home' %}" class="text-white me-3">Головна</a>
            <a href="{% url 'project_list' %}" class="text-white me-3">Проєкти</a>
            {% if user.is_authenticated %}
                <a href="{% url 'add_project' %}" class="btn btn-outline-success btn-sm me-2">Додати проєкт</a>
                <a href="{% url 'connect_telegram' %}" class="btn btn-sm btn-info me-2">Підключити Telegram</a>
                <a href="{% url 'logout' %}" class="btn btn-sm btn-outline-light">Вихід</a>
            {% else %}
                <a href="{% url 'login' %}" class="btn btn-sm btn-primary me-2">Вхід</a>
                <a href="{% url 'register' %}" class="btn btn-sm btn-warning">Реєстрація</a>
            {% endif %}

        </nav>
    </div>
</header>
